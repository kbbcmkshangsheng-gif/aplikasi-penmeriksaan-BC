<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Pemeriksaan BC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📦 Input Barang Hasil Pemeriksaan BC</h1>
    <form id="formBarang">
      <div class="form-group">
        <label>No. Pemeriksaan</label>
        <input type="text" id="noPemeriksaan" placeholder="Contoh: BC-2026-001" required />
      </div>
      <div class="form-group">
        <label>Tanggal Pemeriksaan</label>
        <input type="date" id="tanggal" required />
      </div>
      <div class="form-group">
        <label>Nama Barang</label>
        <input type="text" id="namaBarang" placeholder="Nama barang" required />
      </div>
      <div class="form-group">
        <label>Jumlah</label>
        <input type="number" id="jumlah" placeholder="Jumlah" min="1" required />
      </div>
      <div class="form-group">
        <label>Satuan</label>
        <select id="satuan">
          <option value="pcs">Pcs</option>
          <option value="kg">Kg</option>
          <option value="liter">Liter</option>
          <option value="karton">Karton</option>
          <option value="unit">Unit</option>
        </select>
      </div>
      <div class="form-group">
        <label>Kondisi Barang</label>
        <select id="kondisi">
          <option value="Baik">Baik</option>
          <option value="Rusak">Rusak</option>
          <option value="Mencurigakan">Mencurigakan</option>
        </select>
      </div>
      <div class="form-group">
        <label>Keterangan</label>
        <textarea id="keterangan" placeholder="Keterangan tambahan..."></textarea>
      </div>
      <button type="submit">➕ Tambah Barang</button>
    </form>
    <h2>📋 Daftar Barang</h2>
    <div class="table-wrapper">
      <table id="tabelBarang">
        <thead>
          <tr>
            <th>No</th><th>No. Pemeriksaan</th><th>Tanggal</th><th>Nama Barang</th>
            <th>Jumlah</th><th>Satuan</th><th>Kondisi</th><th>Keterangan</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody id="bodyTabel"></tbody>
      </table>
    </div>
    <button id="exportBtn" onclick="exportCSV()">⬇️ Export CSV</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
